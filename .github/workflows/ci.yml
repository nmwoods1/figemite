name: CI

on:
  push:
  pull_request:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: E2E (browser-mode structural-parity + interaction gates)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/client/playwright-report/
          retention-days: 7

      - name: Build static (read-only) bundle
        run: npm run build:static

      - name: Build @figemite/mcp publish bundle
        run: npm run -w @figemite/mcp build

      - name: License audit
        run: npm run license:audit

      - name: Prepublish reference audit
        run: npm run audit:refs
