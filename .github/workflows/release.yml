name: Release

# Triggered by pushing a `v*` tag, e.g. `v1.0.0`. Runs the full CI gate
# (lint, typecheck, test, license audit, and — non-negotiably — the
# prepublish reference audit), builds the `@figemite/mcp` bundle, and cuts a
# GitHub Release.
#
# npm publishing is DEFERRED: the publish step below is commented out. To
# publish `@figemite/mcp` to npm later, create the `@figemite` npm org, add an
# `NPM_TOKEN` GitHub Actions secret, and uncomment that step.
# `@figemite/{server,client,shared}` are never published (run from a clone —
# see CONTRIBUTING.md).
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Belt-and-suspenders alongside the tag-glob trigger above: refuse to run
    # the publish/release steps unless this workflow run was itself triggered
    # by a real `refs/tags/v*` push (never on a branch push, manual dispatch,
    # or anything else that might slip in later).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: License audit
        run: npm run license:audit

      - name: Prepublish reference audit (BLOCKING — release fails on any forbidden ref)
        run: npm run audit:refs

      - name: Build @figemite/mcp publish bundle
        run: npm run -w @figemite/mcp build

      # Deferred: npm publishing is intentionally disabled for now. To enable,
      # create the `@figemite` npm org + an `NPM_TOKEN` Actions secret, then
      # uncomment this step (the bundle above is already built/verified).
      # - name: Publish @figemite/mcp to npm
      #   run: npm publish -w @figemite/mcp
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
