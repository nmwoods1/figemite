<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>easel</title>
    <style>
      /* Anchors BoardCanvas's `width: 100%; height: 100%` chain to real
         viewport pixels. Without this, `html`/`body`/`#root` all have the
         default `height: auto`, so every `100%` in the tree resolves to 0px
         in a REAL browser layout engine (jsdom has no layout engine, so this
         was invisible to the whole vitest/jsdom suite — the P3-T21
         browser-mode gate is what caught it: `.react-flow` rendered in the
         DOM with correct content but zero-height, so it never became
         "visible"). Ported from the figmalade prototype's `index.html`,
         which had this reset inline for the same reason.
      */
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
